<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Checkout - Monstro Homes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="imagem/google-forms.jpg">
</head>

<body class="bg-light" style="font-family: 'Poppins', sans-serif;">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="card border-0 shadow-lg rounded-4">

                <div class="card-body p-4 p-md-5">

                    <div class="text-center mb-4">
                        <img src="imagem/google_forms_logo_by_aisackparrafans_dfbawam-fullview.png"
                             class="img-fluid mb-3"
                             style="max-height: 80px;"
                             alt="Logo do formulário">

                        <h3 class="fw-bold">Endereço de Cobrança</h3>
                        <p class="text-muted mb-0">Preencha suas informações para finalizar sua compra</p>
                    </div>

                    <form>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="primeiroNome" placeholder="Primeiro Nome">
                                    <label for="primeiroNome">Primeiro nome</label>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="sobrenome" placeholder="Sobrenome">
                                    <label for="sobrenome">Sobrenome</label>
                                </div>
                            </div>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="username" placeholder="Usuário">
                            <label for="username">Nome de usuário</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="email" placeholder="voce@exemplo.com">
                            <label for="email">E-mail</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="endereco" placeholder="Endereço">
                            <label for="endereco">Endereço</label>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <select class="form-select form-select-lg">
                                    <option selected>Escolher País</option>
                                    <option>Brasil</option>
                                    <option>Portugal</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <select class="form-select form-select-lg">
                                    <option selected>Escolher Estado</option>
                                    <option>SP</option>
                                    <option>RJ</option>
                                    <option>MG</option>
                                </select>
                            </div>
                        </div>

                        <hr class="my-4">

                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" id="mesmoEndereco">
                            <label class="form-check-label" for="mesmoEndereco">
                                Endereço de entrega igual ao de cobrança
                            </label>
                        </div>

                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" id="salvarInfo">
                            <label class="form-check-label" for="salvarInfo">
                                Salvar informações para próxima compra
                            </label>
                        </div>

                        <h4 class="fw-bold mb-3">Pagamento</h4>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="pagamento" id="credito" checked>
                            <label class="form-check-label" for="credito">Cartão de Crédito</label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="pagamento" id="debito">
                            <label class="form-check-label" for="debito">Cartão de Débito</label>
                        </div>

                        <div class="form-check mb-4">
                            <input class="form-check-input" type="radio" name="pagamento" id="paypal">
                            <label class="form-check-label" for="paypal">PayPal</label>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="nomeCartao" placeholder="Nome no cartão">
                                    <label for="nomeCartao">Nome no cartão</label>
                                </div>
                                <div class="form-text">
                                    Nome completo como aparece no cartão
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="numeroCartao" placeholder="Número do cartão">
                                    <label for="numeroCartao">Número do cartão</label>
                                </div>
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-3">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="validade" placeholder="MM/AA">
                                    <label for="validade">Validade</label>
                                </div>
                            </div>

                            <div class="col-md-3">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="cvv" placeholder="CVV">
                                    <label for="cvv">CVV</label>
                                </div>
                            </div>
                        </div>

                        <div class="d-grid">
                            <button class="btn btn-primary btn-lg rounded-3 fw-semibold py-3">
                                Finalizar Compra
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
